<VirtualHost *:80>
    ServerName app-egresados.local
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        DirectoryIndex public/index.php
    </Directory>

    <FilesMatch "^(\.env|composer\.(json|lock)|Dockerfile|docker-compose\.ya?ml|\.dockerignore)$">
        Require all denied
    </FilesMatch>

    ErrorLog ${APACHE_LOG_DIR}/app-egresados-error.log
    CustomLog ${APACHE_LOG_DIR}/app-egresados-access.log combined
</VirtualHost>
