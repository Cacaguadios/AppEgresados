<!-- Notice: Cambio de contraseña requerido -->
<div class="utp-notice" id="passwordNotice">
  <div class="container-fluid px-3 px-md-4">
    <div class="d-flex align-items-center justify-content-between gap-3 utp-notice-inner">
      <div class="d-flex align-items-center gap-3">
        <div class="utp-notice-icon flex-shrink-0">
          <i class="bi bi-shield-exclamation"></i>
        </div>
        <div class="utp-notice-text">
          Tu contraseña es temporal. Por seguridad, cámbiala lo antes posible.
        </div>
      </div>
      <div class="d-flex align-items-center gap-2 flex-shrink-0">
        <a href="#" class="btn btn-utp-fixed btn-utp-red" data-link="security">Cambiar ahora</a>
        <button class="utp-icon-x" id="btnDismissNotice" aria-label="Cerrar aviso">
          <i class="bi bi-x-lg"></i>
        </button>
      </div>
    </div>
  </div>
</div>
