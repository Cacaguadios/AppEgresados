<!-- Topbar: Barra superior del dashboard -->
<header>
  <div class="container-fluid px-3 px-md-4">
    <div class="d-flex align-items-center justify-content-between gap-3">
      <!-- Logo y nombre del sistema -->
      <div class="d-flex align-items-center gap-3">
        <img class="rounded-circle" data-asset="img/utp-logo.png"
             alt="UTP" width="40" height="40" src="">
        <div class="lh-sm d-none d-sm-block">
          <div class="fw-bold text-dark">Sistema de Egresados</div>
          <div class="text-muted small">Universidad Tecnológica de Puebla</div>
        </div>
      </div>

      <!-- Acciones de usuario -->
      <div class="d-flex align-items-center gap-2">
        <!-- Notificaciones -->
        <a href="#" class="utp-notif-btn position-relative" aria-label="Notificaciones" id="notifDropdownBtn" data-link="notifications">
          <i class="bi bi-bell" style="font-size:20px;"></i>
          <span class="utp-badge d-none" id="notifCount">0</span>
        </a>

        <!-- User Chip con Dropdown -->
        <div class="utp-userchip dropdown">
          <div class="d-flex align-items-center gap-2" role="button"
               data-bs-toggle="dropdown" aria-expanded="false">
            <div class="utp-useravatar" id="userInitials"></div>
            <div class="utp-userinfo d-none d-sm-flex">
              <div class="utp-username" id="userName"></div>
              <div class="utp-userrole" id="userRole"></div>
            </div>
            <i class="bi bi-chevron-down text-muted"></i>
          </div>
          <ul class="dropdown-menu dropdown-menu-end">
            <li>
              <a class="dropdown-item" href="#" data-link="profile">
                <i class="bi bi-person me-2"></i>Mi Perfil
              </a>
            </li>
            <li>
              <a class="dropdown-item" href="#" data-link="security">
                <i class="bi bi-shield-lock me-2"></i>Seguridad
              </a>
            </li>
            <li><hr class="dropdown-divider"></li>
            <li>
              <a class="dropdown-item text-danger" href="#" data-link="logout">
                <i class="bi bi-box-arrow-right me-2"></i>Cerrar sesión
              </a>
            </li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</header>
